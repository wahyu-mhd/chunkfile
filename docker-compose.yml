services:
  postgres:
    image: postgres:16
    container_name: chunkvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chunkvault
      POSTGRES_USER: chunkvault_user
      POSTGRES_PASSWORD: chunkvault_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: